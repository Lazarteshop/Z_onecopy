<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Z-oneApp: Website Viewer & PPV Rewards</title>
    <meta name="monetag" content="11e081287c25e53b58eb8233ab78e674">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2196f3">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Z-oneApp" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    
    <style>
      .install-btn {
        position: fixed;
        bottom: 75px;
        right: 20px;
        background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 12px 20px;
        border-radius: 9999px;
        font-weight: 800;
        cursor: pointer;
        display: none;
        z-index: 9999;
        box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5), 0 8px 10px -6px rgba(99, 102, 241, 0.5);
        letter-spacing: -0.01em;
        transition: all 0.2s ease-in-out;
      }
      .install-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px -5px rgba(99, 102, 241, 0.6);
      }
      .install-btn:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <button id="installBtn" class="install-btn">Install App</button>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- PWA Installation Script & Service Worker Registration -->
    <script>
      let deferredPrompt;
      const installBtn = document.getElementById("installBtn");

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = "block";
      });

      installBtn.addEventListener("click", () => {
        window.location.href = "/appstore.html";
      });

      window.addEventListener("load", () => {
        setTimeout(() => {
          if (!deferredPrompt) {
            installBtn.style.display = "block";
            installBtn.innerText = "Install App 📱";
          }
        }, 3000);
      });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js")
          .then(() => console.log("SW registered"))
          .catch(err => console.log("SW failed", err));
      }
    </script>
  </body>
</html>
